<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>มินิเกมตอบคำถาม ร.๒๙ พัน.๑</title>
<style>
    :root {
        --army-green: #2f3e22;
        --gold: #d4c26a;
        --dark-overlay: rgba(0, 0, 0, 0.6);
    }

    body {
        margin: 0;
        font-family: 'Tahoma', sans-serif;
        color: #fff;
        background: linear-gradient(var(--dark-overlay), var(--dark-overlay)),
                    url('https://www.transparenttextures.com/patterns/camouflage.png'),
                    linear-gradient(45deg, #3d4f2f, #556b2f);
        text-align: center;
        min-height: 100vh;
        overflow-x: hidden; 
        transition: background 0.3s;
    }

    /* คลาสสำหรับเปลี่ยนหน้าจอเป็นสีแดงกะพริบตอนเวลากดดัน */
    body.panic-mode {
        background: linear-gradient(rgba(200, 0, 0, 0.8), rgba(200, 0, 0, 0.8)),
                    url('https://www.transparenttextures.com/patterns/camouflage.png'),
                    linear-gradient(45deg, #8b0000, #800000);
        animation: redFlash 0.8s infinite;
    }

    .container {
        width: 90%;
        max-width: 800px;
        margin: auto;
        padding: 20px 0;
    }

    .main-crest {
        width: 120px;
        max-width: 100%;
        height: auto;
        filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        margin-bottom: 10px;
    }

    h1 { font-size: 1.8rem; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); color: var(--gold); }
    .unit-tag { font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 10px; }

    #score-board {
        font-size: 1.2rem; font-weight: bold; color: #fff; background: rgba(0,0,0,0.5);
        border: 1px solid var(--gold); display: inline-block; padding: 8px 20px; border-radius: 20px; margin-bottom: 15px;
    }

    .wheel-container { position: relative; width: 100%; max-width: 280px; aspect-ratio: 1 / 1; margin: 10px auto 20px; }

    #wheel {
        width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--gold);
        background: radial-gradient(circle, #4b5d3a, #1a2312); display: flex; align-items: center; justify-content: center;
        transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); box-shadow: 0 0 30px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,0,0,0.5); overflow: hidden; box-sizing: border-box;
    }

    .wheel-logo { width: 75%; height: 75%; object-fit: contain; }
    .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 35px; height: 35px; background: var(--gold); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

    #question-box {
        background: rgba(25, 35, 15, 0.95); border: 2px solid var(--gold); border-radius: 15px;
        padding: 20px; margin: 15px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-height: 80px; width: 95%; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: relative;
    }

    #question-text { font-size: 1.2rem; line-height: 1.4; font-weight: bold; margin-bottom: 15px; color: #fff; }
    #interaction-area { width: 100%; }

    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
    .option-btn, .submit-btn {
        background: rgba(0,0,0,0.6); border: 1px solid var(--gold); color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.2s;
    }
    .option-btn:hover, .submit-btn:hover { background: var(--gold); color: #000; font-weight: bold; }

    .text-input-area { display: flex; flex-direction: column; gap: 10px; align-items: center; width: 100%; }
    .text-input { padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: #fff; color: #000; font-size: 1rem; width: 90%; max-width: 300px; text-align: center; }
    .submit-btn { background: var(--gold); color: #000; font-weight: bold; font-size: 1rem; padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; }

    #feedback { font-size: 1.2rem; font-weight: bold; margin-top: 15px; min-height: 25px; }
    .correct { color: #4caf50; text-shadow: 1px 1px 2px #000; }
    .incorrect { color: #f44336; text-shadow: 1px 1px 2px #000; }

    #timer { font-size: 1.1rem; color: #ffeb3b; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 50px; display: inline-block; border: 1px solid var(--gold); margin-top: 5px; }
    .side-logo { position: fixed; bottom: 15px; right: 15px; width: 70px; opacity: 0.7; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); z-index: 5; }

    #panic-number {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 5rem;
        font-weight: bold;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 0 20px #ff0000;
        z-index: 100;
        pointer-events: none;
        animation: bigNumberPulse 0.8s infinite;
    }

    /* หน้าจอ Effect ตอบถูกชั่วคราว */
    #correct-effect-screen {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(40, 60, 30, 0.95); z-index: 9998; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    }
    #correct-effect-screen h1 {
        font-size: 4rem; color: #4caf50; text-shadow: 0 0 30px rgba(76, 175, 80, 0.8);
        animation: popIn 0.5s ease-out;
    }

    /* หน้าจอ Effect ตอบผิดชั่วคราว */
    #incorrect-effect-screen {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(120, 20, 20, 0.95); z-index: 9998; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    }
    #incorrect-effect-screen h1 {
        font-size: 4rem; color: #f44336; text-shadow: 0 0 30px rgba(244, 67, 54, 0.8);
        animation: popIn 0.5s ease-out;
    }

    /* หน้าจอ Mission Complete */
    #mission-complete-screen {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20, 30, 20, 0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    }
    .mission-logos { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
    .mission-logos img { width: 90px; height: auto; filter: drop-shadow(0 0 15px rgba(212, 194, 106, 0.5)); }
    #mission-complete-screen h1 { font-size: 3rem; color: #ffeb3b; text-shadow: 0 0 30px rgba(255, 235, 59, 1); margin: 20px 0; animation: pulse 1.5s infinite; }
    #mission-complete-screen p { font-size: 1.3rem; color: #fff; }

    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes redFlash { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.5; } }
    @keyframes bigNumberPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.15); } }

    @media (min-width: 768px) {
        h1 { font-size: 2.2rem; } .unit-tag { font-size: 1.3rem; } .main-crest { width: 150px; }
        .side-logo { width: 100px; bottom: 20px; right: 20px; } #question-text { font-size: 1.5rem; }
        #timer { font-size: 1.3rem; padding: 10px 30px; } #question-box { padding: 30px; width: 100%; }
        .text-input-area { flex-direction: row; justify-content: center; } .wheel-container { max-width: 320px; }
        .mission-logos img { width: 150px; gap: 30px; } #mission-complete-screen h1 { font-size: 5rem; }
        #mission-complete-screen p { font-size: 2rem; }
        #panic-number { font-size: 7rem; }
    }
</style>
</head>
<body>

<div id="correct-effect-screen">
    <h1>🎉 ถูกต้อง! 🎉</h1>
</div>

<div id="incorrect-effect-screen">
    <h1>❌ ผิดครับ! ❌</h1>
</div>

<div id="mission-complete-screen">
    <div class="mission-logos">
        <img src="image/ตรากองพันไม่มีพื้นหลัง.png" alt="Crest">
        <img src="image/99322.png" alt="Unit Logo">
        <img src="image/test.png" alt="Infantry Logo">
    </div>
    <h1>MISSION COMPLETE</h1>
    <p>🎉 ยินดีด้วย! คุณปฏิบัติภารกิจสำเร็จ 🎉</p>
</div>

<div class="container">
    <img src="image/ตรากองพันไม่มีพื้นหลัง.png" class="main-crest" alt="Crest">
    <h1>มินิเกมตอบคำถาม</h1>
    <div class="unit-tag">ร.๒๙ พัน.๑ (INFANTRY 291)</div>

    <div id="score-board">ตอบถูกแล้ว: <span id="score">0</span> / 3</div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel" data-rotation="0">
            <img src="image/99322.png" class="wheel-logo" alt="Unit Logo">
        </div>
    </div>

    <div id="question-box">
        <div id="panic-number">10</div>
        
        <div id="question-text">กำลังเตรียมคำถาม...</div>
        <div id="interaction-area"></div>
        <div id="feedback"></div>
    </div>

    <div id="timer">รอกดเริ่มเกม...</div>
</div>

<img src="image/test.png" class="side-logo" alt="Infantry Logo">

<script>
const questions = [
{ type: 'choice', text: "กองทัพไทยมีกี่เหล่าทัพหลัก?", options: ["2 เหล่าทัพ", "3 เหล่าทัพ", "4 เหล่าทัพ", "5 เหล่าทัพ"], answer: "3 เหล่าทัพ" },

{ type: 'choice', text: "ทหารใหม่ตื่นนอนกี่โมง?", options: ["04:00", "05:00", "06:00", "07:00"], answer: "05:00" },

{ type: 'choice', text: "เวลาเคารพธงชาติช่วงเช้าคือกี่โมง?", options: ["04:00", "07:00", "08:00", "10:00"], answer: "08:00" },

{ type: 'choice', text: "อาวุธประจำกายที่ฝึกใช้คืออะไร?", options: ["AK47", "Tavor TAR-21", "M16", "Galil ACE"], answer: "Galil ACE" },

{ type: 'choice', text: "สีน้ำเงินในธงชาติไทยหมายถึงอะไร?", options: ["ชาติ", "ศาสนา", "พระมหากษัตริย์", "ความสงบสุข"], answer: "พระมหากษัตริย์" },

{ type: 'choice', text: "ประเทศไทยมีกี่ภาคตามการแบ่งภูมิศาสตร์?", options: ["4 ภาค", "5 ภาค", "6 ภาค", "7 ภาค"], answer: "6 ภาค" },

{ type: 'choice', text: "วันกองทัพไทยตรงกับวันที่เท่าไร?", options: ["18 ม.ค.", "23 ต.ค.", "5 ธ.ค.", "12 ส.ค."], answer: "18 ม.ค." },

{ type: 'choice', text: "เวลาพบผู้บังคับบัญชาต้องทำอะไรเป็นอย่างแรก?", options: ["ยืนเฉยๆ", "ทำความเคารพ", "เดินหนี", "นั่งลง"], answer: "ทำความเคารพ" },

{ type: 'choice', text: "อะไรหนักที่สุดตอนเป็นทหารใหม่ (อยู่บนใบหน้า)?", options: ["จมูก", "หู", "เปลือกตา", "คาง"], answer: "เปลือกตา" },

{ type: 'choice', text: "ยศต่ำสุดของทหารคืออะไร?", options: ["สิบตรี", "สิบโท", "จ่าสิบเอก", "พลทหาร"], answer: "พลทหาร" },

{ type: 'choice', text: "เครื่องแบบทหารโดยทั่วไปสีอะไร?", options: ["ฟ้า", "แดง", "เขียว", "ขาว"], answer: "เขียว" },

{ type: 'choice', text: "การเคารพธงชาติยืนตรงกี่นาทีโดยประมาณ?", options: ["1 นาที", "2 นาที", "5 นาที", "10 นาที"], answer: "2 นาที" },

{ type: 'choice', text: "เสียงปลุกตอนเช้าของทหารเรียกว่าอะไร?", options: ["รีเวย์", "เรเวลล์", "นกหวีด", "ไซเรน"], answer: "นกหวีด" },

{ type: 'choice', text: "ในกองทัพไทย หน่วยใดเป็นกองทัพบก?", options: ["ทัพอากาศ", "ทัพเรือ", "ทัพบก", "ทุกข้อ"], answer: "ทัพบก" },

{ type: 'choice', text: "คำสั่งพื้นฐานที่ทหารต้องรู้คืออะไร?", options: ["ขวาหัน", "กินข้าว", "นอนพัก", "เล่นโทรศัพท์"], answer: "ขวาหัน" },

{ type: 'choice', text: "ก่อนออกจากแถวต้องทำอะไร?", options: ["วิ่งออกไป", "ขออนุญาต", "นั่งลง", "ตะโกน"], answer: "ขออนุญาต" },

{ type: 'choice', text: "เวลาทหารเดินผ่านผู้บังคับบัญชาต้องทำอะไร?", options: ["เดินต่อไป", "ทำความเคารพ", "หยุดนิ่ง", "หันหลังกลับ"], answer: "ทำความเคารพ" },

{ type: 'choice', text: "ธงชาติไทยมีทั้งหมดกี่สีหลัก?", options: ["2 สี", "3 สี", "4 สี", "5 สี"], answer: "3 สี" },

{ type: 'choice', text: "เวลาฝึกพื้นฐานทหารเน้นเรื่องอะไร?", options: ["ระเบียบวินัย", "เล่นกีฬา", "ทำอาหาร", "เล่นเกม"], answer: "ระเบียบวินัย" },

{ type: 'choice', text: "คำขวัญของทหารคืออะไร?", options: ["ชาติ ศาสนา พระมหากษัตริย์", "รักสนุก", "เรียนเก่ง", "สามัคคีอย่างเดียว"], answer: "ชาติ ศาสนา พระมหากษัตริย์" }
];

let remaining = [...questions];
let countdownInterval;
let timeRemaining = 60;
let currentQuestionObj = null;
let correctCount = 0;
const targetScore = 3;

function resetPanicMode() {
    document.body.classList.remove("panic-mode");
    document.getElementById("panic-number").style.display = "none";
}

function startCountdown() {
    clearInterval(countdownInterval);
    timeRemaining = 60;
    resetPanicMode();
    updateTimerUI();

    countdownInterval = setInterval(() => {
        timeRemaining--;
        
        if (timeRemaining <= 10 && timeRemaining > 0) {
            document.body.classList.add("panic-mode");
            const panicNum = document.getElementById("panic-number");
            panicNum.innerText = timeRemaining;
            panicNum.style.display = "block";
        } else {
            resetPanicMode();
        }

        if (timeRemaining > 0) {
            updateTimerUI();
        } else {
            clearInterval(countdownInterval);
            showIncorrectEffect(() => {
                spin();
            });
        }
    }, 1000);
}

function updateTimerUI() { document.getElementById("timer").innerText = "คำถามถัดไปในอีก " + timeRemaining + " วินาที"; }
function updateScore() { document.getElementById("score").innerText = correctCount; }
function triggerMissionComplete() { 
    clearInterval(countdownInterval); 
    resetPanicMode();
    document.getElementById("mission-complete-screen").style.display = "flex"; 
}

function showCorrectEffect(callback) {
    resetPanicMode(); 
    const effectScreen = document.getElementById("correct-effect-screen");
    effectScreen.style.display = "flex";
    setTimeout(() => {
        effectScreen.style.display = "none";
        if(callback) callback();
    }, 1500); 
}

function showIncorrectEffect(callback) {
    resetPanicMode(); 
    const effectScreen = document.getElementById("incorrect-effect-screen");
    effectScreen.style.display = "flex";
    setTimeout(() => {
        effectScreen.style.display = "none";
        if(callback) callback();
    }, 1500); 
}

function checkAnswer(userAnswer) {
    clearInterval(countdownInterval); 
    resetPanicMode();
    const feedbackText = document.getElementById("feedback");
    
    if (userAnswer.trim().toLowerCase() === currentQuestionObj.answer.trim().toLowerCase()) {
        feedbackText.innerText = "🎉 ถูกต้องเก่งมากครับ!";
        feedbackText.className = "correct";
        document.getElementById("interaction-area").innerHTML = ""; 
        
        correctCount++;
        updateScore();
        
        showCorrectEffect(() => {
            if (correctCount >= targetScore) {
                triggerMissionComplete();
            } else {
                spin(); 
            }
        });
    } else {
        feedbackText.innerText = "❌ ผิดครับ! กำลังเปลี่ยนคำถาม...";
        feedbackText.className = "incorrect";
        document.getElementById("interaction-area").innerHTML = ""; 
        
        showIncorrectEffect(() => {
            spin();
        });
    }
}

function submitTextInput() {
    const inputVal = document.getElementById("answerInput").value;
    if(inputVal === "") return;
    checkAnswer(inputVal);
}

function renderInteraction(qObj) {
    const interactionArea = document.getElementById("interaction-area");
    interactionArea.innerHTML = ""; 
    
    if (qObj.type === 'choice') {
        let grid = document.createElement("div");
        grid.className = "options-grid";
        qObj.options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            grid.appendChild(btn);
        });
        interactionArea.appendChild(grid);
    } 
    else if (qObj.type === 'text') {
        let div = document.createElement("div");
        div.className = "text-input-area";
        
        let input = document.createElement("input");
        input.type = "text";
        input.id = "answerInput";
        input.className = "text-input";
        input.placeholder = "พิมพ์คำตอบที่นี่...";
        
        let btn = document.createElement("button");
        btn.className = "submit-btn";
        btn.innerText = "ตอบ";
        btn.onclick = submitTextInput;

        div.appendChild(input);
        div.appendChild(btn);
        interactionArea.appendChild(div);
    }
}

function spin() {
    if (remaining.length === 0) {
        remaining = [...questions];
    }

    document.getElementById("timer").innerText = "⌛ กำลังหมุนวงล้อ...";
    document.getElementById("question-text").innerText = "กำลังสุ่ม...";
    document.getElementById("interaction-area").innerHTML = "";
    document.getElementById("feedback").innerText = "";
    resetPanicMode();

    const wheel = document.getElementById("wheel");
    let currentRotation = parseFloat(wheel.dataset.rotation);
    let newRotation = currentRotation + 1800 + Math.random() * 1800;
    
    wheel.dataset.rotation = newRotation;
    wheel.style.transform = `rotate(${newRotation}deg)`;

    setTimeout(() => {
        const i = Math.floor(Math.random() * remaining.length);
        currentQuestionObj = remaining.splice(i, 1)[0];
        
        document.getElementById("question-text").innerText = currentQuestionObj.text;
        renderInteraction(currentQuestionObj);
        startCountdown();
    }, 5000);
}

window.onload = spin;
</script>

</body>
</html>
